version: "3"

tasks:
  dev:
    desc: Run the Vite dev server (/api is proxied to the lambda-local adapter)
    cmds:
      - npm run dev

  build:
    sources:
      - ./src/**/*
      - ./taskfile.yaml
    generates:
      - ./dist/assets/**
      - ./dist/index.html
    cmds:
      - |
        npm ci
        npm run build
  deploy:
    cmds:
      - task: build
      - |
        aws s3 cp --recursive ./dist/ s3://"{{.DRAWINGS_BUCKET_NAME}}"/client/

